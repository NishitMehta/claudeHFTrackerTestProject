name: Daily price collector

on:
  schedule:
    # Runs every day at 03:30 UTC (= 09:00 IST). Adjust as needed.
    - cron: "30 3 * * *"
  workflow_dispatch:        # allows manual trigger from the Actions tab

permissions:
  contents: write           # needed to commit the updated CSVs + dashboard
  issues: write             # needed to open price-alert issues
  pages: write              # needed to publish dashboard via Pages
  id-token: write           # needed for the Pages deploy action

concurrency:
  group: "price-collector"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          AMADEUS_API_KEY:    ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          AMADEUS_HOSTNAME:   test          # change to "production" once you have prod keys
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python -m collector.collect

      - name: Commit data + dashboard
        run: |
          git config user.name  "price-collector-bot"
          git config user.email "actions@github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily price collection ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
